<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GED Social Studies Jeopardy Elite</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1a2a4f,#0f1e3a);
color:white;
overflow-x:hidden;
}

h1{text-align:center;margin-top:20px;}

#host{
text-align:center;
color:#f39c12;
margin-bottom:10px;
font-weight:bold;
}

#topBar{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:10px;
}

#score,#timer{
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

#score{background:#16a085;}
#timer{background:#e74c3c;}

#board{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
max-width:1200px;
margin:20px auto;
padding:10px;
}

.category{
background:#101c44;
padding:14px;
font-weight:bold;
text-align:center;
}

.tile{
background:#0057b7;
padding:28px 5px;
cursor:pointer;
font-size:22px;
border-radius:6px;
transition:.2s;
text-align:center;
}

.tile:hover{
transform:scale(1.08);
background:#0090ff;
}

.used{
background:#222 !important;
cursor:default;
}

/* DAILY DOUBLE */
#dailyOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:3000;
animation:pulse 0.5s infinite alternate;
}

@keyframes pulse{
0%{background:black;}
100%{background:#8b0000;}
}

#dailyOverlay h1{
font-size:80px;
color:gold;
margin:0;
animation:scaleUp 1s infinite alternate;
}

@keyframes scaleUp{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
}

#modalContent{
background:white;
color:#1f2d3d;
width:90%;
max-width:800px;
padding:25px;
border-radius:10px;
}

.choice{
background:#e8f1ff;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.choice:hover{background:#cce0ff;}

.correct{background:#c8f7c5 !important;}
.incorrect{background:#ffcccc !important;}

button{
margin-top:10px;
padding:8px 18px;
border:none;
background:#0b132b;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🌎 Social Studies Jeopardy</h1>
<div id="host">Choose any tile. Civics is 50% of the exam.</div>

<div id="topBar">
<div id="score">Score: $0</div>
<div id="timer">Time: 10</div>
</div>

<div id="board"></div>

<div id="dailyOverlay">
<h1>🔥 DAILY DOUBLE 🔥</h1>
<p style="color:white;">Points will be doubled!</p>
</div>

<div id="modal">
<div id="modalContent">
<h2 id="questionTitle"></h2>
<div id="choices"></div>
<button onclick="closeModal()">Back to Board</button>
</div>
</div>

<script>

let score=0;
let timer=10;
let timerInterval=null;

const categories=[
"Civics & Government",
"U.S. History",
"Economics",
"Geography & World",
"Founding Documents",
"Strategy"
];

const values=[100,200,300,400,500];

const questionBank={
"Civics & Government":[
{q:"Which branch makes laws?",a:["Judicial","Executive","Legislative","State"],c:2},
{q:"Checks and balances prevent?",a:["Democracy","Power abuse","Voting","Taxes"],c:1}
],
"U.S. History":[
{q:"The New Deal responded to?",a:["WWI","Great Depression","Cold War","Civil War"],c:1},
{q:"Reconstruction followed?",a:["WWI","Civil War","Cold War","Revolution"],c:1}
],
"Economics":[
{q:"If demand rises and supply stays same?",a:["Price falls","Price rises","Same","None"],c:1},
{q:"Inflation means?",a:["Falling prices","Rising prices","No change","Recession"],c:1}
],
"Geography & World":[
{q:"Push factor example?",a:["War","Peace","Jobs","Growth"],c:0},
{q:"Latitude measures?",a:["East/West","North/South","Elevation","Climate"],c:1}
],
"Founding Documents":[
{q:"'We the People' is from?",a:["Declaration","Preamble","Gettysburg","Amendment 1"],c:1},
{q:"First Amendment protects?",a:["Speech","Taxes","Army","Voting age"],c:0}
],
"Strategy":[
{q:"Most answers come from?",a:["Memory","Source","Guessing","Outside knowledge"],c:1},
{q:"Extreme answers are usually?",a:["Correct","Wrong","Neutral","Required"],c:1}
]
};

let dailyIndex=Math.floor(Math.random()*30);

function buildBoard(){
const board=document.getElementById("board");
board.innerHTML="";
let tileCount=0;

categories.forEach(cat=>{
let div=document.createElement("div");
div.className="category";
div.innerText=cat;
board.appendChild(div);
});

values.forEach(v=>{
categories.forEach((cat)=>{
let tile=document.createElement("div");
tile.className="tile";
tile.innerText="$"+v;

let currentIndex=tileCount;

tile.onclick=function(){
if(tile.classList.contains("used")) return;
tile.classList.add("used");

if(currentIndex===dailyIndex){
triggerDaily(v,cat);
}else{
openQuestion(v,false,cat);
}
};

board.appendChild(tile);
tileCount++;
});
});
}

function triggerDaily(value,cat){
const overlay=document.getElementById("dailyOverlay");
overlay.style.display="flex";

setTimeout(()=>{
overlay.style.display="none";
openQuestion(value,true,cat);
},2500);
}

function openQuestion(value,isDaily,cat){
resetTimer();

const pool=questionBank[cat];
const randomQ=pool[Math.floor(Math.random()*pool.length)];

document.getElementById("modal").style.display="flex";
document.getElementById("questionTitle").innerText=randomQ.q;

const choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";

randomQ.a.forEach((choice,index)=>{
let div=document.createElement("div");
div.className="choice";
div.innerText=choice;

div.onclick=function(){
clearInterval(timerInterval);

if(index===randomQ.c){
div.classList.add("correct");
score+=isDaily?value*2:value;
document.getElementById("host").innerText="Correct!";
}else{
div.classList.add("incorrect");
score-=value;
document.getElementById("host").innerText="Review that concept.";
}

updateScore();
};

choicesDiv.appendChild(div);
});
}

function resetTimer(){
clearInterval(timerInterval);
timer=10;
document.getElementById("timer").innerText="Time: "+timer;

timerInterval=setInterval(()=>{
timer--;
document.getElementById("timer").innerText="Time: "+timer;

if(timer<=0){
clearInterval(timerInterval);
closeModal();
}
},1000);
}

function updateScore(){
document.getElementById("score").innerText="Score: $"+score;
}

function closeModal(){
clearInterval(timerInterval);
document.getElementById("modal").style.display="none";
document.getElementById("host").innerText="Choose your next tile.";
}

buildBoard();

</script>

</body>
</html>
