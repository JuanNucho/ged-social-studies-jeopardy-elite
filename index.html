<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GED Social Studies Jeopardy Elite</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#16213e,#0f3460);
color:white;
overflow-x:hidden;
}

/* INTRO SCREEN */

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#000428,#004e92);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
animation:fadeOut 1s ease forwards 3s;
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

#intro h1{
font-size:48px;
margin:0;
animation:pop 1s ease;
}

@keyframes pop{
0%{transform:scale(0.5);}
100%{transform:scale(1);}
}

h1{
text-align:center;
margin:20px 0 5px 0;
}

#host{
text-align:center;
color:#f39c12;
min-height:25px;
margin-bottom:10px;
}

#topBar{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:10px;
}

#score,#timer{
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

#score{background:#16a085;}
#timer{background:#e74c3c;}

#board{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
max-width:1300px;
margin:20px auto;
padding:10px;
}

.category{
background:#111c44;
padding:14px;
font-weight:bold;
text-align:center;
}

.tile{
background:#0057b7;
padding:28px 5px;
cursor:pointer;
font-size:22px;
border-radius:6px;
transition:.2s;
}

.tile:hover{
transform:scale(1.05);
background:#0080ff;
}

.used{
background:#222 !important;
cursor:default;
}

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
}

#modalContent{
background:white;
color:#1f2d3d;
width:90%;
max-width:800px;
padding:25px;
border-radius:10px;
}

.choice{
background:#e8f1ff;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.choice:hover{background:#cce0ff;}

.correct{background:#c8f7c5 !important;}
.incorrect{background:#ffcccc !important;}

.daily{
background:gold !important;
color:black;
font-weight:bold;
}

button{
margin-top:10px;
padding:8px 18px;
border:none;
background:#0b132b;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="intro">
<h1>🌎 GED SOCIAL STUDIES</h1>
<p>JEOPARDY ELITE MODE</p>
</div>

<h1>🌎 Social Studies Jeopardy</h1>
<div id="host">Civics makes up 50% of the exam.</div>

<div id="topBar">
<div id="score">Score: $0</div>
<div id="timer">Time: 10</div>
</div>

<div id="board"></div>

<div id="modal">
<div id="modalContent">
<h2 id="questionTitle"></h2>
<div id="choices"></div>
<button onclick="closeModal()">Back to Board</button>
</div>
</div>

<script>

let score=0;
let timer=10;
let timerInterval=null;

const categories=[
"Civics & Government",
"U.S. History",
"Economics",
"Geography & World",
"Founding Documents",
"Strategy"
];

const values=[100,200,300,400,500];

const questions=[
{cat:0,val:100,q:"Which branch makes laws?",a:["Judicial","Executive","Legislative","State"],c:2},
{cat:4,val:100,q:"'We the People' appears in?",a:["Declaration","Preamble","Bill of Rights","Gettysburg"],c:1},
{cat:2,val:200,q:"If demand increases, price?",a:["Falls","Rises","Freezes","Same"],c:1},
{cat:1,val:300,q:"New Deal addressed?",a:["WWI","Depression","Civil War","Cold War"],c:1},
{cat:3,val:400,q:"Push factor example?",a:["War","Jobs","Peace","Growth"],c:0},
{cat:5,val:500,q:"Extreme words like 'always'?",a:["Correct","Wrong","Neutral","Required"],c:1}
];

const dailyDoubleIndex=Math.floor(Math.random()*questions.length);

function buildBoard(){
let board=document.getElementById("board");
categories.forEach(cat=>{
let div=document.createElement("div");
div.className="category";
div.innerText=cat;
board.appendChild(div);
});

values.forEach(v=>{
categories.forEach((cat,i)=>{
let tile=document.createElement("div");
tile.className="tile";
tile.innerText="$"+v;

tile.onclick=function(){
if(tile.classList.contains("used")) return;

let qIndex=questions.findIndex(x=>x.cat===i && x.val===v);
if(qIndex===-1) return;

tile.classList.add("used");

if(qIndex===dailyDoubleIndex){
tile.classList.add("daily");
openDaily(questions[qIndex]);
}else{
openQuestion(questions[qIndex]);
}
};

board.appendChild(tile);
});
});
}

function openDaily(q){
document.getElementById("host").innerText="🔥 DAILY DOUBLE!";
openQuestion(q,true);
}

function openQuestion(q,isDaily=false){

document.getElementById("modal").style.display="flex";
document.getElementById("questionTitle").innerText=q.q;

let choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";

startTimer();

q.a.forEach((choice,index)=>{
let div=document.createElement("div");
div.className="choice";
div.innerText=choice;

div.onclick=function(){
clearInterval(timerInterval);

if(index===q.c){
div.classList.add("correct");
score+=isDaily?q.val*2:q.val;
document.getElementById("host").innerText="Correct! Strong reasoning.";
}else{
div.classList.add("incorrect");
score-=q.val;
document.getElementById("host").innerText="Stay sharp. Review the concept.";
}

updateScore();
};

choicesDiv.appendChild(div);
});
}

function startTimer(){
timer=10;
document.getElementById("timer").innerText="Time: "+timer;

clearInterval(timerInterval);

timerInterval=setInterval(()=>{
timer--;
document.getElementById("timer").innerText="Time: "+timer;

if(timer<=0){
clearInterval(timerInterval);
closeModal();
}
},1000);
}

function updateScore(){
document.getElementById("score").innerText="Score: $"+score;
}

function closeModal(){
clearInterval(timerInterval);
document.getElementById("modal").style.display="none";
document.getElementById("host").innerText="Choose your next category.";
}

buildBoard();

</script>

</body>
</html>
