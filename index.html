<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GED Social Studies Jeopardy Elite 3.0</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#16213e,#0f3460);
color:white;
overflow-x:hidden;
}

h1{
text-align:center;
margin:20px 0 5px 0;
}

#host{
text-align:center;
color:#f39c12;
margin-bottom:10px;
min-height:24px;
}

#topBar{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:10px;
}

#score,#timer{
padding:6px 15px;
border-radius:20px;
font-weight:bold;
}

#score{background:#16a085;}
#timer{background:#e74c3c;}

#board{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:6px;
max-width:1300px;
margin:20px auto;
padding:10px;
}

.category{
background:#111c44;
padding:14px;
font-weight:bold;
text-align:center;
}

.tile{
background:#0057b7;
padding:28px 5px;
cursor:pointer;
font-size:22px;
border-radius:6px;
transition:.2s;
text-align:center;
}

.tile:hover{
transform:scale(1.05);
background:#0080ff;
}

.used{
background:#222 !important;
cursor:default;
}

/* DAILY DOUBLE ANIMATION */
#dailyOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:gold;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:2000;
animation:flash 1s infinite alternate;
}

@keyframes flash{
0%{background:gold;}
100%{background:orange;}
}

#dailyOverlay h1{
font-size:60px;
color:black;
margin:0;
}

#modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:none;
justify-content:center;
align-items:center;
}

#modalContent{
background:white;
color:#1f2d3d;
width:90%;
max-width:800px;
padding:25px;
border-radius:10px;
}

.choice{
background:#e8f1ff;
padding:12px;
margin:8px 0;
border-radius:6px;
cursor:pointer;
}

.choice:hover{background:#cce0ff;}

.correct{background:#c8f7c5 !important;}
.incorrect{background:#ffcccc !important;}

button{
margin-top:10px;
padding:8px 18px;
border:none;
background:#0b132b;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🌎 Social Studies Jeopardy</h1>
<div id="host">Choose any category. Civics is 50% of the exam.</div>

<div id="topBar">
<div id="score">Score: $0</div>
<div id="timer">Time: 10</div>
</div>

<div id="board"></div>

<div id="dailyOverlay">
<h1>🔥 DAILY DOUBLE 🔥</h1>
<p style="color:black;">Points will be doubled!</p>
</div>

<div id="modal">
<div id="modalContent">
<h2 id="questionTitle"></h2>
<div id="choices"></div>
<button onclick="closeModal()">Back to Board</button>
</div>
</div>

<script>

let score=0;
let timer=10;
let timerInterval=null;
let dailyActive=false;

const categories=[
"Civics & Government",
"U.S. History",
"Economics",
"Geography & World",
"Founding Documents",
"Strategy"
];

const values=[100,200,300,400,500];

const questionBank=[
{q:"Which branch makes laws?",a:["Judicial","Executive","Legislative","State"],c:2},
{q:"The New Deal responded to?",a:["WWI","Depression","Cold War","Civil War"],c:1},
{q:"If demand rises and supply stays same?",a:["Falls","Rises","Same","Disappears"],c:1},
{q:"Push factor example?",a:["War","Peace","Jobs","Growth"],c:0},
{q:"'We the People' is from?",a:["Declaration","Preamble","Gettysburg","Amendment 1"],c:1},
{q:"Extreme words usually?",a:["Correct","Wrong","Neutral","Required"],c:1}
];

const dailyTile=Math.floor(Math.random()*30);

function buildBoard(){
let board=document.getElementById("board");

categories.forEach(cat=>{
let div=document.createElement("div");
div.className="category";
div.innerText=cat;
board.appendChild(div);
});

let tileIndex=0;

values.forEach(v=>{
categories.forEach(()=>{
let tile=document.createElement("div");
tile.className="tile";
tile.innerText="$"+v;

tile.onclick=function(){
if(tile.classList.contains("used")) return;

tile.classList.add("used");

if(tileIndex===dailyTile){
triggerDaily(v);
}else{
openQuestion(v,false);
}
};

board.appendChild(tile);
tileIndex++;
});
});
}

function triggerDaily(value){
dailyActive=true;
let overlay=document.getElementById("dailyOverlay");
overlay.style.display="flex";

setTimeout(()=>{
overlay.style.display="none";
openQuestion(value,true);
},2000);
}

function openQuestion(value,isDaily){
resetTimer();

let randomQ=questionBank[Math.floor(Math.random()*questionBank.length)];

document.getElementById("modal").style.display="flex";
document.getElementById("questionTitle").innerText=randomQ.q;

let choicesDiv=document.getElementById("choices");
choicesDiv.innerHTML="";

randomQ.a.forEach((choice,index)=>{
let div=document.createElement("div");
div.className="choice";
div.innerText=choice;

div.onclick=function(){
clearInterval(timerInterval);

if(index===randomQ.c){
div.classList.add("correct");
score+=isDaily?value*2:value;
document.getElementById("host").innerText="Correct! Strong reasoning.";
}else{
div.classList.add("incorrect");
score-=value;
document.getElementById("host").innerText="Review the concept and stay sharp.";
}

updateScore();
};

choicesDiv.appendChild(div);
});
}

function resetTimer(){
clearInterval(timerInterval);
timer=10;
document.getElementById("timer").innerText="Time: "+timer;

timerInterval=setInterval(()=>{
timer--;
document.getElementById("timer").innerText="Time: "+timer;

if(timer<=0){
clearInterval(timerInterval);
closeModal();
}
},1000);
}

function updateScore(){
document.getElementById("score").innerText="Score: $"+score;
}

function closeModal(){
clearInterval(timerInterval);
document.getElementById("modal").style.display="none";
document.getElementById("host").innerText="Choose your next category.";
}

buildBoard();

</script>

</body>
</html>
